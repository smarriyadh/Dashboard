<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم العقود</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1>📊 لوحة تحكم العقود</h1>
        </header>

        <!-- لوحة التصفيات -->
        <div class="filters">
            <div class="filter-group">
                <label for="professionFilter">المهنة:</label>
                <select id="professionFilter"></select>
            </div>
            <div class="filter-group">
                <label for="statusFilter">حالة العقد:</label>
                <select id="statusFilter"></select>
            </div>
            <div class="filter-group">
                <label for="nationalityFilter">الجنسية:</label>
                <select id="nationalityFilter"></select>
            </div>
            <button id="resetFilters" class="reset-btn">إعادة تعيين</button>
        </div>

        <!-- بطاقات مؤشرات الأداء -->
        <div class="kpi-cards">
            <div class="card">
                <h3>إجمالي العقود</h3>
                <p id="totalContracts">0</p>
            </div>
            <div class="card">
                <h3>إجمالي المبلغ المستحق</h3>
                <p id="totalAmountDue">0 ر.س</p>
            </div>
            <div class="card">
                <h3>متوسط مدة الاستقدام (يوم)</h3>
                <p id="avgDuration">0</p>
            </div>
        </div>

        <!-- شبكة الرسوم البيانية -->
        <div class="charts-grid">
            <div class="chart-card">
                <canvas id="amountByProfessionChart"></canvas>
            </div>
            <div class="chart-card">
                <canvas id="contractsByNationalityChart"></canvas>
            </div>
            <div class="chart-card">
                <canvas id="amountOverTimeChart"></canvas>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
